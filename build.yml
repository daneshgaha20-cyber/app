name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip python3-dev build-essential \
          libssl-dev libffi-dev liblzma-dev libsqlite3-dev openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake wget

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pre-setup Android SDK and AIDL
        run: |
          # ۱. تعریف مسیرهای دقیق
          export SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          export BUILD_TOOLS_DIR="$SDK_DIR/build-tools/34.0.0"
          
          echo "Targeting SDK at: $SDK_DIR"
          
          # ۲. ساخت ساختار پوشه‌ها
          mkdir -p "$BUILD_TOOLS_DIR"
          mkdir -p "$SDK_DIR/cmdline-tools"
          
          # ۳. دانلود مستقیم ابزار خط فرمان گوگل (که حاوی دستورات ضروری است)
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip cmdtools.zip
          mv cmdline-tools "$SDK_DIR/cmdline-tools/latest"
          rm cmdtools.zip
          
          # ۴. دانلود مستقیم ابزار Build-Tools (برای حل مشکل AIDL)
          # ما مستقیماً فایل‌های اصلی را دانلود می‌کنیم تا Buildozer دنبال آن‌ها نگردد
          echo "Downloading Build-Tools to ensure AIDL exists..."
          # نکته: در محیط گیت‌هاب دانلود مستقیم حجم بالا ممکن است طول بکشد
          # اما این تنها راهی است که Buildozer را مجبور به دیدن AIDL می‌کنیم
          
          # ۵. تنظیم متغیرهای محیطی به صورت قطعی برای مرحله بعد
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "PATH=$BUILD_TOOLS_DIR:$SDK_DIR/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          # اطمینان از تنظیمات buildozer.spec
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # فعال سازی لایسنس با جایگزینی مستقیم متن
          sed -i 's/^#\?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          
          # اجرای بیلد با ارسال متغیرها مستقیماً به دستور
          # ما از دستور 'yes' استفاده می‌کنیم تا تمام سوالات لایسنس را خودکار Yes بزند
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Android-APK
          path: bin/*.apk
