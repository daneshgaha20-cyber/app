name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-dev build-essential \
            libssl-dev libffi-dev liblzma-dev libsqlite3-dev \
            openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            wget unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Force Create Android SDK Structure (Critical Fix)
        run: |
          # تعریف مسیر اصلی که Buildozer به دنبال آن می‌گردد
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
          BUILD_TOOLS_PATH="$SDK_PATH/build-tools/34.0.0"
          CMDLINE_TOOLS_PATH="$SDK_PATH/cmdline-tools/latest"
          
          echo "Creating directories at: $BUILD_TOOLS_PATH"
          
          # ساخت تمام مسیرهای ممکن به صورت تهاجمی
          mkdir -p "$BUILD_TOOLS_PATH"
          mkdir -p "$CMDLINE_TOOLS_PATH"
          
          # دانلود Command Line Tools گوگل
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          
          # انتقال ابزارها به مسیر درست
          mv cmdline-tools/* "$CMDLINE_TOOLS_PATH/"
          rm -rf cmdline-tools
          rm cmdline-tools.zip
          
          # تنظیم متغیرهای محیطی برای کل سیستم
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_PATH" >> $GITHUB_ENV
          echo "PATH=$BUILD_TOOLS_PATH:$PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          # اطمینان از وجود فایل spec
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # فعال‌سازی لایسنس با روش جایگزین (جایگزینی متن مستقیم)
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          
          # اجرای بیلد با اجازه دادن به تمام سوالات احتمالی
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Android-APK-Result
          path: bin/*.apk
