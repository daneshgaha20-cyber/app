name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-dev build-essential \
            libssl-dev libffi-dev liblzma-dev libsqlite3-dev \
            openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            wget unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Manual Android SDK Setup (Fix for AIDL error)
        run: |
          # ایجاد پوشه‌های مورد نیاز Buildozer
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/build-tools/34.0.0
          
          # دانلود و نصب اندروید کامپوننت‌ها به صورت مستقیم
          # این بخش برای اطمینان از وجود فایل aidl است
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          
          # تنظیم متغیرهای محیطی
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # اصلاح فایل spec برای اطمینان از استفاده از لایسنس و تنظیمات صحیح
          sed -i 's/^#\?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          
          # اجرای بیلد با دستور yes برای رد کردن لایسنس‌ها
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Drought-Stress-RF-APK
          path: bin/*.apk
