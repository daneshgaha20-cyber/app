name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-20.04  # استفاده از نسخه پایدارتر

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # نسخه پایدارتر

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-dev \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libssl-dev \
            libffi-dev \
            liblzma-dev \
            libsqlite3-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer init
          sed -i 's/title = .*/title = Drought Stress RF/' buildozer.spec
          sed -i 's/package.name = .*/package.name = droughtstressrf/' buildozer.spec
          # تنظیمات ویژه برای جلوگیری از خطای Aidl
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/#android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/#android.sdk = .*/android.sdk = 33/' buildozer.spec
          sed -i 's/#android.minapi = .*/android.minapi = 21/' buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drought-Stress-RF-APK
          path: bin/*.apk
